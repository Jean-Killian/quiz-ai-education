# Fichier de configuration de l'orchestration locale
# Usages : Lancement simple (MVP) pour un étudiant ou une démonstration

services:
  # ------
  # APPLICATION WEB
  # ------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: quiz-ai-education-app:latest
    container_name: quiz_app
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    # Charge un potentiel fichier .env local (pour les clés secrètes) si existant
    env_file:
      - path: .env
        required: false
    environment:
      # --- Variables de configuration explicites ---
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - LOG_CHANNEL=stderr
      
      # Configuration Base de données (reliée au conteneur db)
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=quiz_db
      - DB_USERNAME=quiz_user
      - DB_PASSWORD=quiz_password
      
      # Configuration IA (ATTENDUE DANS .env POUR ÊTRE FONCTIONNELLE)
      # - MISTRAL_API_KEY=votre_cle_api 
    volumes:
      # Persistance du stockage public et logs
      - storage_data:/var/www/html/storage

  # ------
  # BASE DE DONNÉES
  # ------
  db:
    image: mysql:8.0
    container_name: quiz_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: quiz_db
      MYSQL_USER: quiz_user
      MYSQL_PASSWORD: quiz_password
      MYSQL_ROOT_PASSWORD: quiz_root_password
    ports:
      - "3306:3306"
    volumes:
      # Persistance des données de la base MySQL
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  storage_data:
  db_data:
